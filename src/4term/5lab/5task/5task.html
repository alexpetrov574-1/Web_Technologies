<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Движение рисунка</title>
    <style>
      body {
        margin: 0;
        padding: 20px;
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
      }
      h1 {
        color: #2c3e50;
      }
      #container {
        position: relative;
        margin: 20px 0;
      }
      #background {
        width: 50%;
        display: block;
      }
      #moving {
        position: absolute;
        left: 0;
        top: 0;
        width: 100px;
        height: 100px;
      }
    </style>
    <script type="text/javascript">
      let x = 0;
      let y = 0;
      let stepY = 5;
      let stepX = 0;
      let direction = "down";
      let bgImg, moveImg;
      let bgWidth, bgHeight, moveWidth, moveHeight;

      function move() {
        // Движение по вертикали
        if (direction === "down") {
          y += stepY;
          // Если достигли нижней границы
          if (y >= bgHeight - moveHeight) {
            direction = "right";
            x += stepX;
          }
        } else if (direction === "up") {
          y -= stepY;
          // Если достигли верхней границы
          if (y <= 0) {
            direction = "right";
            x += stepX;
          }
        } else if (direction === "right") {
          // Движение вправо на ширину рисунка
          x += moveWidth;
          stepX = 0;
          // Проверяем, не вышли ли за правую границу
          if (x >= bgWidth - moveWidth) {
            // Достигли правой границы фона
            x = bgWidth - moveWidth;
            document.getElementById("moving").style.left = x + "px";
            return;
          }
          direction = "down";
          stepX = 0;
        }

        // Устанавливаем новые координаты
        let movingImg = document.getElementById("moving");
        movingImg.style.left = x + "px";
        movingImg.style.top = y + "px";

        // Меняем направление на противоположное по вертикали при достижении границ
        if (direction === "down" && y >= bgHeight - moveHeight) {
          direction = "up";
        } else if (direction === "up" && y <= 0) {
          direction = "down";
        }

        // Продолжаем движение
        setTimeout("move()", 50);
      }

      // Инициализация
      window.onload = function () {
        bgImg = document.getElementById("background");
        moveImg = document.getElementById("moving");
        bgWidth = bgImg.width;
        bgHeight = bgImg.height;
        moveWidth = moveImg.width;
        moveHeight = moveImg.height;

        // Запускаем движение
        move();
      };
    </script>
  </head>
  <body>
    <h1>Движение рисунка зигзагом</h1>
    <div id="container">
      <img src="background.jpg" id="background" alt="Фон" />
      <img src="утка.jpg" id="moving" alt="Движущийся" />
    </div>
  </body>
</html>
