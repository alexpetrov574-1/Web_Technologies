<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Изменение цвета блока</title>
    <style>
      body {
        background-color: #f0f0f0;
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      #colorBlock {
        width: 250px;
        height: 250px;
        background-color: red;
        border: 10px inset darkblue;
        margin: 20px 0;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #2ecc71;
        color: white;
        border: none;
      }
      button:hover {
        background-color: #27ae60;
      }
    </style>
    <script type="text/javascript">
      let isRed = true;

      function changeColor() {
        let block = document.getElementById("colorBlock");
        let btn = document.getElementById("changeBtn");

        if (isRed) {
          block.style.backgroundColor = "lightblue";
          btn.value = "Изменить на красный";
          btn.innerHTML = "Изменить на красный";
        } else {
          block.style.backgroundColor = "red";
          btn.value = "Изменить на голубой";
          btn.innerHTML = "Изменить на голубой";
        }
        isRed = !isRed;
      }
    </script>
  </head>
  <body>
    <h1>Изменение цвета блока</h1>
    <div id="colorBlock"></div>
    <form>
      <input
        type="button"
        id="changeBtn"
        value="Изменить на голубой"
        onclick="changeColor()"
      />
    </form>
  </body>
</html>
