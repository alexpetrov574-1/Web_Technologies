<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Показать/Спрятать картинки</title>
    <link rel="stylesheet" href="4task.css" />
    <script type="text/javascript" src="4task.js"></script>
  </head>
  <body>
    <h1>Управление видимостью картинок</h1>
    <table>
      <tr>
        <td>
          <div class="image-container">
            <img id="img1" src="source/кот.jpg" alt="Картинка 1" />
          </div>
          <form>
            <input
              type="button"
              id="btn1"
              value="Спрячь меня"
              onclick="toggleImage(1)"
            />
          </form>
        </td>
        <td>
          <div class="image-container">
            <img id="img2" src="source/собака.jpg" alt="Картинка 2" />
          </div>
          <form>
            <input
              type="button"
              id="btn2"
              value="Спрячь меня"
              onclick="toggleImage(2)"
            />
          </form>
        </td>
      </tr>
    </table>
  </body>
</html>
