<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страничка по заказу</title>
    <link rel="stylesheet" href="1task.css" />
  </head>
  <body>
    <script type="text/javascript" src="1task.js"></script>
    <h1>Страничка по заказу</h1>

    <form id="orderForm">
      <div class="form-group">
        <label for="artist">Художник:</label>
        <select id="artist" name="artist">
          <option value="aivazovsky">Айвазовский</option>
          <option value="davinci">да Винчи</option>
          <option value="shishkin">Шишкин</option>
        </select>
      </div>

      <div class="form-group">
        <label for="caption">Подпись:</label>
        <input type="text" id="caption" name="caption" value="" />
      </div>

      <div class="form-group">
        <div class="section-title">
          <span style="display: inline-block; width: 250px"
            >Картинка для фона</span
          >
          <span>Декорирование текста</span>
        </div>

        <div class="radio-group">
          <input
            type="radio"
            id="bg1"
            name="background"
            value="bg/footer.jpg"
          />
          <label for="bg1">footer.jpg</label>

          <input type="checkbox" id="italic" name="decor" value="italic" />
          <label for="italic">курсив/нет</label>
        </div>

        <div class="radio-group">
          <input type="radio" id="bg2" name="background" value="bg/222.jpg" />
          <label for="bg2">222.jpg</label>

          <input
            type="checkbox"
            id="underline"
            name="decor"
            value="underline"
          />
          <label for="underline">подчеркивание/нет</label>
        </div>

        <div class="radio-group">
          <input
            type="radio"
            id="bg3"
            name="background"
            value="bg/bg16.jpg"
            checked
          />
          <label for="bg3">bg16.jpg</label>

          <input type="checkbox" id="bold" name="decor" value="bold" />
          <label for="bold">жирный/нет</label>
        </div>
      </div>

      <div class="buttons">
        <input type="reset" value="Сброс" />
        <input type="button" value="Показать" onclick="showPage()" />
      </div>
    </form>
  </body>
</html>
