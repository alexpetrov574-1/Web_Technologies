<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Животные</title>
    <style>
      body {
        background-color: #f5f5dc;
        font-family: Arial, sans-serif;
        padding: 20px;
        color: #2c3e50;
      }
      h1 {
        color: #34495e;
      }
      table {
        margin: 20px 0;
        border-collapse: collapse;
      }
      td {
        padding: 15px;
        border: 1px solid #bdc3c7;
        vertical-align: top;
      }
      .animal-name {
        font-weight: bold;
        cursor: pointer;
        padding: 10px;
        width: 200px;
      }
      .animal-name:hover {
        background-color: #ecf0f1;
      }
      .image-cell {
        width: 250px;
        height: 200px;
        text-align: center;
      }
      img {
        max-width: 200px;
        max-height: 180px;
        border: 2px solid #3498db;
      }
    </style>
    <script type="text/javascript">
      function showImage(animalId, imgSrc) {
        let imgCell = document.getElementById("img" + animalId);
        if (imgSrc) {
          imgCell.innerHTML =
            '<img src="' + imgSrc + '" alt="' + animalId + '">';
        } else {
          imgCell.innerHTML = "";
        }
      }
    </script>
  </head>
  <body>
    <h1>Наведите на название животного</h1>
    <table>
      <tr>
        <td
          class="animal-name"
          onmouseover="showImage('1', 'кот.jpg')"
          onmouseout="showImage('1', '')"
        >
          Кошка
        </td>
        <td class="image-cell" id="img1"></td>
      </tr>
      <tr>
        <td
          class="animal-name"
          onmouseover="showImage('2', 'собака.jpg')"
          onmouseout="showImage('2', '')"
        >
          Собака
        </td>
        <td class="image-cell" id="img2"></td>
      </tr>
      <tr>
        <td
          class="animal-name"
          onmouseover="showImage('3', 'утка.jpg')"
          onmouseout="showImage('3', '')"
        >
          Птица
        </td>
        <td class="image-cell" id="img3"></td>
      </tr>
    </table>
  </body>
</html>
