<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Животные</title>
    <link rel="stylesheet" href="2task.css" />
    <script type="text/javascript" src="2task.js"></script>
  </head>
  <body>
    <h1>Наведите на название животного</h1>
    <table>
      <tr>
        <td
          class="animal-name"
          onmouseover="showImage('1', 'source/кот.jpg')"
          onmouseout="showImage('1', '')"
        >
          Кошка
        </td>
        <td class="image-cell" id="img1"></td>
      </tr>
      <tr>
        <td
          class="animal-name"
          onmouseover="showImage('2', 'source/собака.jpg')"
          onmouseout="showImage('2', '')"
        >
          Собака
        </td>
        <td class="image-cell" id="img2"></td>
      </tr>
      <tr>
        <td
          class="animal-name"
          onmouseover="showImage('3', 'source/утка.jpg')"
          onmouseout="showImage('3', '')"
        >
          Птица
        </td>
        <td class="image-cell" id="img3"></td>
      </tr>
    </table>
  </body>
</html>
